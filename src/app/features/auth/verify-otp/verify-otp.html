<div class="bg-animation"></div>

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="register-card text-center p-4 p-md-5">

        <h1 class="brand-title">OTP</h1>
        <p class="subtitle mb-4">
            Entrez le code envoyé par email
        </p>

        <div *ngIf="errorMessage" class="alert alert-warning mb-3 text-start">
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="onVerifyOtp()">

            <div class="otp-container d-flex justify-content-center gap-2">
                <input 
                    #input1
                    type="text" 
                    maxlength="1" 
                    [(ngModel)]="otpInputs[0]" 
                    name="otp1"
                    aria-label="Chiffre 1 de l'OTP"
                    (keyup)="moveFocus($event, null, input2)"
                    class="otp-field"
                    required>
                
                <input 
                    #input2
                    type="text" 
                    maxlength="1" 
                    [(ngModel)]="otpInputs[1]" 
                    name="otp2"
                    aria-label="Chiffre 2 de l'OTP"
                    (keyup)="moveFocus($event, input1, input3)"
                    class="otp-field"
                    required>
                
                <input 
                    #input3
                    type="text" 
                    maxlength="1" 
                    [(ngModel)]="otpInputs[2]" 
                    name="otp3"
                    aria-label="Chiffre 3 de l'OTP"
                    (keyup)="moveFocus($event, input2, input4)"
                    class="otp-field"
                    required>
                
                <input 
                    #input4
                    type="text" 
                    maxlength="1" 
                    [(ngModel)]="otpInputs[3]" 
                    name="otp4"
                    aria-label="Chiffre 4 de l'OTP"
                    (keyup)="moveFocus($event, input3, input5)"
                    class="otp-field"
                    required>
                
                <input 
                    #input5
                    type="text" 
                    maxlength="1" 
                    [(ngModel)]="otpInputs[4]" 
                    name="otp5"
                    aria-label="Chiffre 5 de l'OTP"
                    (keyup)="moveFocus($event, input4, input6)"
                    class="otp-field"
                    required>
                
                <input #input6
                    type="text" maxlength="1" 
                    [(ngModel)]="otpInputs[5]" name="otp6"
                    aria-label="Chiffre 6 de l'OTP"
                    (keyup)="moveFocus($event, input5, null)"
                    class="otp-field"
                    required>
            </div>

            <button type="submit" class="btn btn-register w-100 mt-4 py-2" [disabled]="isLoading">

                <span *ngIf="!isLoading">Vérifier OTP</span>

                <span *ngIf="isLoading" class="d-flex align-items-center justify-content-center gap-2">
                    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                    Vérification...
                </span>
            </button>

        </form>

    </div>

</div>
