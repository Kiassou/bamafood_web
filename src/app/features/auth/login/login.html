<!-- Background -->

<div class="bg-animation"></div>

<!-- Particles -->

<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="login-card p-4 p-md-5 text-center">

        <!-- Logo -->

        <h1 class="brand-title mb-2">
            Bama<span>Food</span>
        </h1>

        <p class="text-muted small mb-4">
            La saveur à portée de clic
        </p>

        <!-- Error message -->

        <div *ngIf="errorMessage" class="alert alert-warning mb-1">
            {{ errorMessage }}
        </div>

        <!-- FORM -->

        <form (ngSubmit)="onLogin()" autocomplete="off">

            <!-- USERNAME -->

            <div class="mb-3 text-start">

                <label class="form-label text-light-50">
                    Identifiant
                </label>

                <div class="input-group custom-input-group">

                    <span class="input-group-text">
                        <i class="bi bi-person-fill"></i>
                    </span>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Nom d'utilisateur"
                        [(ngModel)]="username"
                        name="username"
                        autocomplete="off"
                        required>

                </div>

            </div>

            <!-- PASSWORD -->

            <div class="mb-4 text-start">

                <label class="form-label text-light-50">
                    Mot de passe
                </label>

                <div class="input-group custom-input-group">

                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>

                    <input
                        [type]="showPassword ? 'text' : 'password'"
                        class="form-control"
                        placeholder="••••••••"
                        [(ngModel)]="password"
                        name="password"
                        autocomplete="new-password"
                        required>

                    <!-- Toggle password -->

                    <span
                        class="input-group-text toggle-password"
                        (click)="togglePassword()">

                        <i class="bi"
                           [ngClass]="showPassword ? 'bi-eye' : 'bi-eye-slash'">
                        </i>

                    </span>

                </div>

            </div>

            <!-- BUTTON -->

            <button type="submit" class="btn btn-submit w-100 py-2 mb-3" [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
    
                {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
    
                <i *ngIf="!isLoading" class="bi bi-arrow-right-short ms-1"></i>
            </button>

            <!-- LINKS -->

            <div class="d-flex justify-content-between option-links small">

                <a routerLink="/forgot-password"
                   class="text-decoration-none">

                    Mot de passe oublié ?

                </a>

                <p>

                    Nouveau sur BamaFood ?

                    <a routerLink="/register"
                       class="text-decoration-none">

                        S'inscrire

                    </a>

                </p>

            </div>

        </form>

    </div>

</div>
