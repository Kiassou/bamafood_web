<div class="analytics-page"
    style="background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), url('assets/images/bamafood_splash.png');">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="analytics-card">
    <div class="icon-badge">
      <i class="bi bi-graph-up-arrow"></i>
    </div>

    <h1>Service momentanément indisponible</h1>
    <p class="lead">
      La page Analytics BamaFood est en cours de préparation.
      Nous travaillons sur une version plus complète et plus élégante.
    </p>

    <div class="status-row">
      <span class="status-dot"></span>
      <span>Analyse graphique en maintenance</span>
    </div>

    <div class="loader-wrap">
      <div class="loader"></div>
      <div class="loader"></div>
      <div class="loader"></div>
    </div>

    <a [routerLink]="['/manager/dashboard']" class="back-btn">
      <i class="bi bi-arrow-left"></i>
      Retour au dashboard
    </a>
  </div>
</div>
